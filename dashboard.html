<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Placement Portal</title> <!-- <-- This is the website name -->
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
<h2>Dashboard</h2>
<ul>
<li onclick="showSection('profile')">Profile</li>
<li onclick="showSection('companies')">Companies</li>
<li onclick="showSection('jobs')">Jobs</li>
<li onclick="showSection('stats')">Placement Stats</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<div class="main">
<!-- Profile -->
<div id="profile" class="section">
<h2>Student Profile</h2>
<p><b>Name:</b> <span id="studentName"></span></p>
<p><b>Branch:</b> <span id="studentBranch"></span></p>
<p><b>CGPA:</b> <span id="studentCGPA"></span></p>
<button onclick="editProfile()">Edit Profile</button>
<div id="editForm" style="display:none;">
<input type="text" id="editName" placeholder="Name">
<input type="text" id="editBranch" placeholder="Branch">
<input type="number" step="0.1" id="editCGPA" placeholder="CGPA">
<button onclick="saveProfile()">Save</button>
</div>
</div>

<!-- Companies -->
<div id="companies" class="section" style="display:none;">
<h2>Companies Visiting</h2>
<input type="text" placeholder="Search company..." id="searchCompany" onkeyup="searchCompany()">
<div id="companyList" class="companyGrid"></div>
</div>

<!-- Jobs -->
<div id="jobs" class="section" style="display:none;">
<h2>Jobs Available</h2>
<label>Filter by Branch:</label>
<select id="filterBranch" onchange="filterJobs()">
<option value="">All</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="IT">IT</option>
<option value="MECH">MECH</option>
</select>
<label>Filter by CGPA:</label>
<input type="number" id="filterCGPA" step="0.1" placeholder="Min CGPA" oninput="filterJobs()">
<div id="jobContainer" class="jobGrid"></div>
</div>

<!-- Stats -->
<div id="stats" class="section" style="display:none;">
<h2>Placement Stats</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
